name: Build Mineradio APK

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node.js backend dependencies
        run: |
          cd app/src/main/assets/nodejs-project
          npm install --production
          ls -la node_modules/ 2>/dev/null || echo "No node_modules"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK (debug key)
        run: |
          echo "Using debug keystore for APK signing"
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mineradio-Android-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Mineradio-Android-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
